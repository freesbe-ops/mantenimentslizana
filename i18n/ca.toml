[testimonis_title]
other = "Testimonis"

[testimonis_subtitle]
other = "Opinió de persones que han confiat en nosaltres"

[testimonis_anna]
other = "\"Em van instal·lar una mosquitera en menys d'una hora. Van ser puntuals, nets i el resultat és perfecte. S'ho recomano a tothom.\""

[testimonis_anna_nom]
other = "Anna M."

[testimonis_anna_ciutat]
other = "Girona"

[testimonis_carles]
other = "\"Feia mesos que tenia la piscina verda i no sabia què fer. Van diagnosticar el problema, em van canviar la bomba i em van deixar la piscina perfecta. Molt professionals.\""

[testimonis_carles_nom]
other = "Carles R."

[testimonis_carles_ciutat]
other = "Cassà de la Selva"

[testimonis_marta]
other = "\"Em van instal·lar diversos endolls nous a casa i van deixar-ho tot impecable. A més, em van assessorar sobre la millor ubicació. Molt recomanables.\""

[testimonis_marta_nom]
other = "Marta L."

[testimonis_marta_ciutat]
other = "Lloret de Mar"

[testimonis_jordi]
other = "\"Van fer el manteniment de la piscina de la meva casa d'estiueig. Van ser molt flexibles amb l'horari i em van deixar unes instruccions clares per al dia a dia. Deu!\""

[testimonis_jordi_nom]
other = "Jordi F."

[testimonis_jordi_ciutat]
other = "Hostalric"

[testimonis_laura]
other = "\"Em van diagnosticar i reparar una avaria a la bomba de la piscina en un sol dia. Van ser ràpids, eficients i em van explicar què havia passat. Confiança total.\""

[testimonis_laura_nom]
other = "Laura S."

[testimonis_laura_ciutat]
other = "Vidreres"

[testimonis_pere]
other = "\"Necessitava arreglar uns endolls a casa i també em van fer una revisió de la instal·lació elèctrica. Van deixar-ho tot net, segur i amb un preu més que raonable. Excel·lents.\""

[testimonis_pere_nom]
other = "Pere G."

[testimonis_pere_ciutat]
other = "Sant Feliu de Guíxols"

