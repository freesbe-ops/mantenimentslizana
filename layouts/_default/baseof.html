<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CB6G5KWZS6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-CB6G5KWZS6');
</script>
</head>
<body>
    {{ partial "header.html" . }}
    {{ partial "announcement.html" . }}
    <main style="padding-top: 110px;">
        {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    <script src="/js/scroll.js"></script>
    <script src="/js/menu.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('btn-hero');
            if (btn) {
                btn.addEventListener('mouseenter', function() {
                    this.style.background = '#00326B';
                    this.style.color = 'white';
                    this.style.borderColor = '#00326B';
                });
                btn.addEventListener('mouseleave', function() {
                    this.style.background = 'white';
                    this.style.color = '#00326B';
                    this.style.borderColor = 'white';
                });
            }
        });
    </script>
    {{ partial "floating-button.html" . }}
</body>
</html>
