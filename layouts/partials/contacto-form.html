<section id="contacte" style="padding:4rem 0; background: white; color: #00326B;">
    <div style="max-width: 800px; margin: 0 auto; padding: 0 20px; text-align:center;">
        <h2 style="font-size:2.5rem; margin-bottom:0.5rem;">{{ if eq .Site.Language.Lang "es" }}Contáctanos{{ else }}Contacta'ns{{ end }}</h2>
        <p style="font-size:1.2rem; margin-bottom:1.5rem;">
            <i class="fas fa-phone" style="margin-right:0.5rem;"></i> 677 218 303
            <span style="margin:0 1rem;">|</span>
            <i class="fas fa-envelope" style="margin-right:0.5rem;"></i> mantenimentlizana@gmail.com
        </p>
        <form id="contact-form" style="display:flex; flex-direction:column; gap:1rem; text-align:left;">
            <div style="display:flex; flex-wrap:wrap; gap:1rem;">
                <div style="flex:1 1 45%;">
                    <label for="nombre" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Nombre y apellidos *{{ else }}Nom i cognoms *{{ end }}</label>
                    <input type="text" id="nombre" name="nombre" required style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;">
                </div>
                <div style="flex:1 1 45%;">
                    <label for="pueblo" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Pueblo / Localidad{{ else }}Poble / Localitat{{ end }}</label>
                    <input type="text" id="pueblo" name="pueblo" style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;">
                </div>
            </div>
            <div style="display:flex; flex-wrap:wrap; gap:1rem;">
                <div style="flex:1 1 45%;">
                    <label for="telefono" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Teléfono *{{ else }}Telèfon *{{ end }}</label>
                    <input type="tel" id="telefono" name="telefono" required style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;">
                </div>
                <div style="flex:1 1 45%;">
                    <label for="email" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Email *{{ else }}Email *{{ end }}</label>
                    <input type="email" id="email" name="email" required style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;">
                </div>
            </div>
            <div>
                <label for="servicio" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Tipo de servicio{{ else }}Tipus de servei{{ end }}</label>
                <select id="servicio" name="servicio" style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;">
                    <option value="">{{ if eq .Site.Language.Lang "es" }}Selecciona...{{ else }}Selecciona...{{ end }}</option>
                    <option value="Aire acondicionado">{{ if eq .Site.Language.Lang "es" }}Aire acondicionado{{ else }}Aire condicionat{{ end }}</option>
                    <option value="Reparaciones en casa">{{ if eq .Site.Language.Lang "es" }}Reparaciones en casa{{ else }}Reparacions a casa{{ end }}</option>
                    <option value="Mantenimiento general">{{ if eq .Site.Language.Lang "es" }}Mantenimiento general{{ else }}Manteniment general{{ end }}</option>
                    <option value="Piscinas">{{ if eq .Site.Language.Lang "es" }}Piscinas{{ else }}Piscines{{ end }}</option>
                    <option value="Jardinería">{{ if eq .Site.Language.Lang "es" }}Jardinería{{ else }}Jardineria{{ end }}</option>
                    <option value="Inmobiliarias">{{ if eq .Site.Language.Lang "es" }}Inmobiliarias{{ else }}Immobiliàries{{ end }}</option>
                    <option value="Segundas residencias">{{ if eq .Site.Language.Lang "es" }}Segundas residencias{{ else }}Segones residències{{ end }}</option>
                    <option value="Otros">{{ if eq .Site.Language.Lang "es" }}Otros{{ else }}Altres{{ end }}</option>
                </select>
            </div>
            <div>
                <label for="comentarios" style="font-weight:600;">{{ if eq .Site.Language.Lang "es" }}Comentarios / Descripción{{ else }}Comentaris / Descripció{{ end }}</label>
                <textarea id="comentarios" name="comentarios" rows="4" style="width:100%; padding:0.8rem; border:1px solid #00326B; border-radius:0; background:#f9f9f9;"></textarea>
            </div>
            <button type="submit" id="submit-btn" style="background:#00326B; color:white; padding:1rem 2rem; border:none; font-size:1.2rem; cursor:pointer; text-transform:uppercase; font-weight:600; transition:all 0.3s;">
                {{ if eq .Site.Language.Lang "es" }}Enviar solicitud{{ else }}Enviar sol·licitud{{ end }}
            </button>
            <div id="form-message" style="display:none; margin-top:1rem; font-weight:600; color:#28a745;"></div>
        </form>
    </div>
</section>
<script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.textContent = '{{ if eq .Site.Language.Lang "es" }}Enviando...{{ else }}Enviant...{{ end }}';
        btn.disabled = true;
        const data = new FormData(this);
        fetch('https://script.google.com/macros/s/AKfycbxjpQK5l5n1pD6fLxXmJfX3vP5cVqyNwYzH7dQ/exec', {
            method: 'POST',
            body: data
        })
        .then(response => response.text())
        .then(result => {
            document.getElementById('form-message').style.display = 'block';
            document.getElementById('form-message').textContent = '{{ if eq .Site.Language.Lang "es" }}¡Solicitud enviada con éxito! Nos pondremos en contacto contigo pronto.{{ else }}Sol·licitud enviada amb èxit! Ens posarem en contacte amb tu aviat.{{ end }}';
            this.reset();
            btn.textContent = '{{ if eq .Site.Language.Lang "es" }}Enviar solicitud{{ else }}Enviar sol·licitud{{ end }}';
            btn.disabled = false;
        })
        .catch(error => {
            document.getElementById('form-message').style.display = 'block';
            document.getElementById('form-message').textContent = '{{ if eq .Site.Language.Lang "es" }}Error al enviar. Inténtalo de nuevo.{{ else }}Error en enviar. Torna-ho a provar.{{ end }}';
            btn.textContent = '{{ if eq .Site.Language.Lang "es" }}Enviar solicitud{{ else }}Enviar sol·licitud{{ end }}';
            btn.disabled = false;
        });
    });
</script>
