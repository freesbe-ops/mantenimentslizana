<section id="contacte" style="padding:4rem 0; background: white; color: #00326B;">
    <div style="max-width: 100%; padding: 0 20px; margin: 0 auto; text-align:center;">
        <!-- Títol -->
        <h2 style="color:#00326B; font-size:2.5rem; font-weight:700; margin-bottom:0.5rem; text-transform:uppercase;">Contacta'ns</h2>
        
        <!-- Telèfon i email -->
<p style="font-size:1.2rem; font-weight:400; margin-bottom:0.5rem;">
    <i class="fas fa-phone" style="color:#00326B;"></i> <strong><a href="tel:+34677218303" style="color:#00326B; text-decoration:none;">677 218 303</a></strong> 
    | <i class="fas fa-envelope" style="color:#00326B;"></i> <strong><a href="mailto:mantenimentlizana@gmail.com" style="color:#00326B; text-decoration:none;">mantenimentlizana@gmail.com</a></strong>
</p>        
        <!-- FORMULARI -->
        <form id="contact-form" style="max-width:600px; margin:0 auto; background:white; padding:2rem; text-align:left;">
            
            <div style="margin-bottom:1.5rem;">
                <label for="nom" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Nom i cognoms *</label>
                <input type="text" id="nom" name="nom" required style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem;">
            </div>

            <div style="margin-bottom:1.5rem;">
                <label for="poblacio" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Poble / Localitat</label>
                <input type="text" id="poblacio" name="poblacio" style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem;">
            </div>

            <div style="margin-bottom:1.5rem;">
                <label for="telefon" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Telèfon *</label>
                <input type="tel" id="telefon" name="telefon" required style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem;">
            </div>

            <div style="margin-bottom:1.5rem;">
                <label for="email" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Email *</label>
                <input type="email" id="email" name="email" required style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem;">
            </div>

            <div style="margin-bottom:1.5rem;">
                <label for="tipus" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Tipus de servei</label>
                <select id="tipus" name="tipus" style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem;">
                    <option value="">Selecciona...</option>
                    <option value="jardineria">Jardineria</option>
                    <option value="reparacio">Reparació</option>
                    <option value="fontaneria">Fontaneria</option>
                    <option value="piscina">Piscina</option>
                    <option value="electricitat">Electricitat</option>
                    <option value="mobiliari">Mobiliari / Fusteria</option>
                    <option value="altres">Altres</option>
                </select>
            </div>

            <div style="margin-bottom:1.5rem;">
                <label for="comentaris" style="display:block; font-weight:600; margin-bottom:0.3rem; text-transform:uppercase; color:#00326B;">Comentaris / Descripció</label>
                <textarea id="comentaris" name="comentaris" rows="4" style="width:100%; padding:0.8rem; border:2px solid #00326B; border-radius:0; background:white; font-size:1rem; resize:vertical;"></textarea>
            </div>

            <button type="submit" class="btn" style="width:100%; padding:1rem; font-size:1.1rem; cursor:pointer; border:2px solid #00326B; background:transparent; color:#00326B; font-weight:bold; transition:all 0.3s ease; border-radius:0; text-transform:uppercase;">Enviar sol·licitud</button>
        </form>

        <div id="form-message" style="text-align:center; font-weight:bold; margin-top:1rem; color:#00326B;"></div>

        <script>
            document.getElementById('contact-form').addEventListener('submit', function(e) {
                e.preventDefault();

                const messageDiv = document.getElementById('form-message');
                const form = this;

                messageDiv.innerHTML = '⏳ Enviant...';
                messageDiv.style.color = '#00326B';

                const formData = new URLSearchParams();
                formData.append('nom', form.nom.value);
                formData.append('poblacio', form.poblacio.value);
                formData.append('telefon', form.telefon.value);
                formData.append('email', form.email.value);
                formData.append('tipus', form.tipus.value);
                formData.append('comentaris', form.comentaris.value);

                const url = 'https://script.google.com/macros/s/AKfycbwupXElgqK9zuPYYziUOBulax-Slj1HGSYypSE66ftUEje4cCAIbiwbEhEfQEP04CDg/exec';

                fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                })
                .then(response => response.text())
                .then(result => {
                    if (result === 'OK') {
                        messageDiv.innerHTML = '✅ Enviat! Ens posarem en contacte aviat. Si tens fotos, envia-les per WhatsApp al 677 218 303.';
                        messageDiv.style.color = 'green';
                        form.reset();
                    } else {
                        messageDiv.innerHTML = '❌ Error: ' + result;
                        messageDiv.style.color = 'red';
                    }
                })
                .catch(error => {
                    messageDiv.innerHTML = '❌ Error de connexió. Torna-ho a provar.';
                    messageDiv.style.color = 'red';
                    console.error('Error:', error);
                });
            });
        </script>
    </div>
</section>
